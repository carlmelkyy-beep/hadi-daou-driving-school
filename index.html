<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driving Test</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)),
        url("images/hadi%20daw%20last%20logo.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: white;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .page {
      min-height: 100vh;
      padding: 16px 24px 28px;
      position: relative;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .lang-select {
      padding: 12px 18px;
      border-radius: 14px;
      border: 1px solid rgba(240, 222, 222, 0.35);
      font-size: 15px;
      cursor: pointer;
      outline: none;
      background: rgba(53, 54, 56, 0.75);
      color: white;
      font-weight: bold;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    .lang-select:hover {
      background: rgba(30, 41, 59, 0.9);
      border-color: rgba(255,255,255,0.5);
    }

    .header-area {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      text-align: center;
      padding-top: 0;
    }

    .logo {
      width: 320px;
      max-width: 88%;
      height: auto;
      object-fit: contain;
      display: block;
      margin: -110px auto 8px;
      filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.35));
    }

    .school-name-top {
      font-size: 28px;
      font-weight: bold;
      margin-top: -65px;
      text-align: center;
      color: white;
      text-shadow: 0 3px 12px rgba(0,0,0,0.6);
    }

    .title {
      font-size: 46px;
      font-weight: bold;
      line-height: 1.2;
      max-width: 760px;
      margin: 0 auto;
      color: rgba(255, 255, 255, 0.96);
      text-shadow: 0 3px 14px rgba(0, 0, 0, 0.3);
    }

    .form-area {
      width: 100%;
      max-width: 860px;
      margin: 290px auto 0;
    }

    .section-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 5px;
      text-align: left;
      text-shadow: 0 3px 14px rgba(0, 0, 0, 0.3);
    }

    .options {
      display: flex;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: -38px;
      
    }

    .option-btn {
      border: 2px solid rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(8px);
      color: white;
      padding: 14px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 17px;
      font-weight: bold;
      line-height: 1.4;
      min-height: 58px;
      max-width: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: 0.3s;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
      margin-bottom: 10px;
      flex: 1;
white-space: nowrap;
    }

    .option-btn:hover {
      background: rgba(255, 255, 255, 0.24);
      transform: translateY(-2px);
    }

    .option-btn.active {
      background: rgba(220, 38, 38, 0.94);
      border-color: rgba(255, 255, 255, 0.95);
      color: white;
    }

    .start-btn {
      margin-top: 5%;
      width: 110%;
      background: red;
      color: white;
      border: none;
      padding: 15px;
      font-size: 21px;
      border-radius: 18px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.22);
    }

    .start-btn:hover {
      background: rgb(232, 111, 111);
      transform: translateY(-1px);
    }

    .error {
      color: #ffe4e6;
      font-size: 15px;
      margin-top: 10px;
      display: none;
      font-weight: bold;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
    }

    .school-name {
      margin-top: 14px;
      text-align: center;
      font-size: 25px;
      font-weight: bold;
      color: white;
      text-shadow: 0 3px 12px rgba(0,0,0,0.6);
    }

    @media (max-width: 1100px) {
      .form-area {
        margin-top: 170px;
      }

      .options {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 900px) {
      .logo {
        width: 230px;
        margin: -40px auto 8px;
      }

      .school-name-top {
        font-size: 22px;
        margin-top: -18px;
      }

      .title {
        font-size: 34px;
      }

      .form-area {
        margin-top: 85px;
      }

      .option-btn {
        min-height: 72px;
        font-size: 16px;
      }
    }

    @media (max-width: 768px) {

      body {
        margin: 0;
        padding: 0;
        background: #121414;
        color: white;
        overflow-x: hidden;
      }

      .page {
        padding: 0 0 20px 0;
      }

      .header-area {
        position: relative;
        width: 100%;
        height: 260px;
        background: url("images/hadi%20daw%20last%20logo.png") no-repeat center top;
        background-size: cover;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        overflow: hidden;
      }

      .header-area::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
      }

      .header-area * {
        position: relative;
        z-index: 2;
      }

      .top-bar {
        position: absolute;
        top: 14px;
        right: 14px;
        z-index: 10;
      }

      .lang-select {
        padding: 7px 14px;
        border-radius: 20px;
        border: none;
        background: rgba(0, 0, 0, 0.45);
        color: white;
        font-size: 14px;
        font-weight: 600;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      .logo {
        width: 295px;
        margin-bottom: 62px;
      }

      .school-name-top {
        font-size: 26px;
        font-weight: 600;
        margin-bottom: 5px;
        color: white;
      }

      .title {
        margin-bottom: 15px;
        font-size: 22px;
        font-weight: 700;
        line-height: 1.25;
        color: white;
        text-align: center;
        max-width: 90%;
      }

      .form-area {
        width: 92%;
        max-width: 420px;
        margin: 15px auto 0 auto;
        padding: 18px 14px;
        border-radius: 24px;
        background: rgba(35, 35, 35, 0.78);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.45);
      }

      .section-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 14px;
        text-align: left;
        color: white;
      }

      .options {
        display: flex;
        flex-direction: column;
        gap: 12px;
         align-items: center; 
      }

      .option-btn {
        width: 100%;
        min-height: 62px;
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        color: rgb(255, 246, 246);
        font-size: 15px;
        font-weight: 600;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
        align-items: center !important;
      }

      .option-btn:hover {
        background: rgba(255, 255, 255, 0.14);
      }

      .option-btn.active {
        background: linear-gradient(135deg, #ff0000, #ff3b3b);
        border: none;
      }

      .start-btn {
       display: block;              /* 🔥 IMPORTANT */
  width: 90%;
  max-width: 400px;
  padding: 15px;
  margin: 40px auto 0 auto;    /* centers it */
  border: none;
  border-radius: 20px;
  background: linear-gradient(135deg, #ff0000, #ff3b3b);
  color: white;
  font-size: 17px;
  font-weight: 700;
  box-shadow: 0 8px 20px rgba(255, 0, 0, 0.35);
  cursor: pointer;
  text-align: center; 
      }

      .error {
        margin-top: 10px;
        font-size: 14px;
        text-align: center;
        color: #ffe4e6;
      }

      .school-name {
        text-align: center;
        margin: 14px auto 0 auto;
        font-size: 17px;
        color: white;
        line-height: 1.5;
      }

      .school-name a {
        color: white !important;
        text-decoration: none;
        font-weight: 700;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <select class="lang-select" id="languageSwitcher">
        
        <option value="en">English</option>
        <option value="fr">Français</option>
        <option value="ar">العربية</option>
      </select>
    </div>

    <div class="header-area">
      <img src="images/newlogo.png" alt="HD Logo" class="logo">
      <div class="school-name-top">Auto Ecole Hadi Daou</div>
      <h1 class="title" id="title">Driving Theory Test</h1>
    </div>
    
    <div class="form-area">
      <div class="section-title" id="chooseTestLabel">Choose Test Type </div>

      <div class="options" id="testOptions">
        <button class="option-btn" data-value="public_car" id="publicCarBtn">Public car testing</button>
        <button class="option-btn" data-value="private_car" id="privateCarBtn">Private car test</button>
        <button class="option-btn" data-value="motorcycle" id="motorcycleBtn">Motorcycle test</button>
        <button class="option-btn" data-value="minibus" id="miniBusBtn">Mini Bus Test</button>
        <button class="option-btn" data-value="small_truck" id="smallTruckBtn">Small Trucks Test</button>
        <button class="option-btn" data-value="signs" id="signBtn">Sign test</button>
      </div>

      <button class="start-btn" id="startBtn">Start Test</button>
      <p class="error" id="errorMsg">Please select a test type.</p>

      <div class="school-name">Baabdat Main Street 03941104 - 24820199</div>
    </div>
  </div>

  <script>
    const translations = {
      en: {
        title: "Driving Theory Test",
        chooseTest: "Choose Test Type",
        publicCar: "Public car testing",
        privateCar: "Private car test",
        motorcycle: "Motorcycle test",
        miniBus: "Mini Bus Test",
        smallTruck: "Small Trucks Test",
        sign: "Sign test",
        start: "Start Test",
        error: "Please select a test type."
      },
      fr: {
        title: "Test Théorique de Conduite",
        chooseTest: "Choisir le type de test",
        publicCar: "Examen de voiture public",
        privateCar: "Examen de voiture privée",
        motorcycle: "Examen de Moto",
        miniBus: "Test Minibus",
        smallTruck: "Test Petits Camions",
        sign: "Test des panneaux",
        start: "Commencer le test",
        error: "Veuillez sélectionner un type de test."
      },
      ar: {
        title: "امتحان السوق النظري",
        chooseTest: "اختر نوع الامتحان",
        publicCar: "اختبار السيارات عمومي",
        privateCar: "اختبار السيارات خصوصي",
        motorcycle: "اختبار الدراجات النارية",
        miniBus: "اختبار الميني باص",
        smallTruck: "اختبار الشاحنات الصغيرة",
        sign: "اختبار الإشارات",
        start: "ابدأ الامتحان",
        error: "يرجى اختيار نوع الامتحان."
      }
    };

    let selectedLanguage = localStorage.getItem("selectedLanguage") || "en";
    let selectedTest = "";

    const switcher = document.getElementById("languageSwitcher");
    const title = document.getElementById("title");
    const chooseTestLabel = document.getElementById("chooseTestLabel");
    const publicCarBtn = document.getElementById("publicCarBtn");
    const privateCarBtn = document.getElementById("privateCarBtn");
    const motorcycleBtn = document.getElementById("motorcycleBtn");
    const miniBusBtn = document.getElementById("miniBusBtn");
    const smallTruckBtn = document.getElementById("smallTruckBtn");
    const signBtn = document.getElementById("signBtn");
    const startBtn = document.getElementById("startBtn");
    const errorMsg = document.getElementById("errorMsg");

    function applyLanguage(lang) {
      const t = translations[lang];

      title.textContent = t.title;
      chooseTestLabel.textContent = t.chooseTest;
      publicCarBtn.textContent = t.publicCar;
      privateCarBtn.textContent = t.privateCar;
      motorcycleBtn.textContent = t.motorcycle;
      miniBusBtn.textContent = t.miniBus;
      smallTruckBtn.textContent = t.smallTruck;
      signBtn.textContent = t.sign;
      startBtn.textContent = t.start;
      errorMsg.textContent = t.error;

      if (lang === "ar") {
        document.documentElement.lang = "ar";
        document.documentElement.dir = "rtl";
        chooseTestLabel.style.textAlign = "right";
      } else {
        document.documentElement.lang = lang;
        document.documentElement.dir = "ltr";
        chooseTestLabel.style.textAlign = "left";
      }

      localStorage.setItem("selectedLanguage", lang);
    }

    switcher.value = selectedLanguage;
    applyLanguage(selectedLanguage);

    switcher.addEventListener("change", function () {
      selectedLanguage = this.value;
      applyLanguage(selectedLanguage);
    });

    const testButtons = document.querySelectorAll(".option-btn");

    testButtons.forEach(button => {
      button.addEventListener("click", () => {
        testButtons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        selectedTest = button.dataset.value;
      });
    });

    startBtn.addEventListener("click", () => {
      if (!selectedTest) {
        errorMsg.style.display = "block";
        return;
      }

      errorMsg.style.display = "none";
      localStorage.setItem("selectedLanguage", selectedLanguage);
      localStorage.setItem("selectedTest", selectedTest);
      window.location.href = "quiz.html";
    });
  </script>
</body>
</html>
